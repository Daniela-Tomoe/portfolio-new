<section id="contact" class="app-section py-20">
  <div class="mx-auto grid max-w-6xl gap-10 px-4 lg:grid-cols-[0.8fr_1.2fr]">
    <div class="animate-page-in">
      <h2 class="app-title text-3xl font-black">{{ i18n.t('contact.title') }}</h2>
      <p class="app-muted mt-4 text-lg leading-8">{{ i18n.t('contact.subtitle') }}</p>
      <div class="app-muted mt-8 space-y-3">
        <p><i class="app-accent-text pi pi-envelope mr-2"></i>email&#64;exemplo.com</p>
        <p><i class="app-accent-text pi pi-linkedin mr-2"></i>linkedin.com/in/seu-perfil</p>
        <p><i class="app-accent-text pi pi-github mr-2"></i>github.com/seu-usuario</p>
      </div>
    </div>

    <form class="app-panel rounded-lg border p-5 shadow-sm animate-page-in [animation-delay:90ms]">
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="app-label grid gap-2 text-sm font-medium">
          {{ i18n.t('contact.name') }}
          <input pInputText type="text" name="name" />
        </label>
        <label class="app-label grid gap-2 text-sm font-medium">
          {{ i18n.t('contact.email') }}
          <input pInputText type="email" name="email" />
        </label>
      </div>
      <label class="app-label mt-4 grid gap-2 text-sm font-medium">
        {{ i18n.t('contact.message') }}
        <textarea class="app-textarea min-h-36 rounded-md border p-3 outline-none" name="message"></textarea>
      </label>
      <div class="mt-5">
        <p-button [label]="i18n.t('contact.send')" icon="pi pi-send" severity="success" />
      </div>
    </form>
  </div>
</section>
