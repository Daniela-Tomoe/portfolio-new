<section id="hero" class="app-section">
  <div class="mx-auto flex min-h-[calc(100vh-145px)] max-w-6xl flex-col items-center gap-10 px-4 py-16 lg:flex-row lg:justify-between">
    <div class="animate-page-in flex-1">
      <h1 class="app-title max-w-3xl text-4xl font-black leading-tight tracking-normal sm:text-5xl lg:text-6xl">
        {{ i18n.t('hero.title') }}
      </h1>
      <p class="app-muted mt-5 max-w-2xl text-lg leading-8">
        {{ i18n.t('hero.subtitle') }}
      </p>
      <div class="mt-8 flex flex-col gap-3 sm:flex-row">
        <p-button [label]="i18n.t('hero.cta.primary')" icon="pi pi-briefcase" severity="success" (onClick)="goTo('/projects')" />
        <p-button [label]="i18n.t('hero.cta.secondary')" icon="pi pi-send" severity="secondary" [outlined]="true" (onClick)="goTo('/contact')" />
      </div>
      <div class="app-accent-border app-muted mt-10 flex max-w-2xl flex-col gap-3 border-l-4 pl-5 sm:flex-row sm:items-center sm:gap-8">
        <p class="m-0">
          <span class="app-metric-value block text-2xl font-black">4+</span>
          <span class="text-sm">{{ i18n.t('hero.metric.years') }}</span>
        </p>
        <p class="m-0">
          <span class="app-metric-value block text-2xl font-black">Angular</span>
          <span class="text-sm">{{ i18n.t('hero.metric.stack') }}</span>
        </p>
      </div>
    </div>

    <div class="responsive-animation">
      <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Linhas de conexão -->
        <path class="connection connection-1" d="M105 115 C135 80, 185 80, 215 115" />
        <path class="connection connection-2" d="M115 145 C150 175, 190 175, 225 145" />

        <!-- Monitor -->
        <g class="device pc">
          <rect x="35" y="65" width="110" height="75" rx="8" />
          <rect x="75" y="140" width="30" height="20" rx="3" />
          <rect x="60" y="158" width="60" height="8" rx="4" />
          <line x1="50" y1="85" x2="130" y2="85" />
          <line x1="50" y1="105" x2="110" y2="105" />
          <line x1="50" y1="122" x2="120" y2="122" />
        </g>

        <!-- Tablet -->
        <g class="device tablet">
          <rect x="178" y="55" width="78" height="105" rx="10" />
          <circle cx="217" cy="148" r="3" />
          <line x1="190" y1="78" x2="244" y2="78" />
          <line x1="190" y1="98" x2="232" y2="98" />
          <line x1="190" y1="118" x2="240" y2="118" />
        </g>

        <!-- Celular -->
        <g class="device phone">
          <rect x="238" y="92" width="45" height="78" rx="9" />
          <circle cx="260.5" cy="159" r="2.5" />
          <line x1="248" y1="112" x2="273" y2="112" />
          <line x1="248" y1="128" x2="267" y2="128" />
          <line x1="248" y1="143" x2="272" y2="143" />
        </g>

        <!-- Bolinha de movimento -->
        <circle class="pulse-dot" cx="160" cy="110" r="5" />
      </svg>
    </div>
  </div>
</section>
