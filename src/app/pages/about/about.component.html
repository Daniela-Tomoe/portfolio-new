<section id="about" class="app-section py-20">
  <div class="mx-auto max-w-6xl px-4">
    <h2 class="app-title animate-page-in text-3xl font-black">{{ i18n.t('about.title') }}</h2>
    <p class="app-muted mt-4 max-w-3xl text-lg leading-8 animate-page-in [animation-delay:70ms]">{{ i18n.t('about.text') }}</p>
    <div class="mt-10 grid gap-5 md:grid-cols-2">
      <p-card [header]="i18n.t('about.card1.title')">
        <p class="app-muted m-0">{{ i18n.t('about.card1.text') }}</p>
      </p-card>
      <p-card [header]="i18n.t('about.card2.title')">
        <p class="app-muted m-0">{{ i18n.t('about.card2.text') }}</p>
      </p-card>
    </div>
  </div>
</section>
