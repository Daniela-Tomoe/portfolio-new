<header class="app-header sticky top-0 z-50 border-b backdrop-blur">
  <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 px-4 py-3">
    <img src="../../assets/images/personal-logo-removebg-preview.png" alt="Logo pessoal" class="h-8 w-auto object-contain" />

    <nav class="app-muted order-3 flex w-full items-center gap-4 overflow-x-auto whitespace-nowrap pb-1 text-sm font-medium md:order-2 md:w-auto md:gap-6 md:overflow-visible md:pb-0">
      <a class="app-nav-link transition" routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">{{ i18n.t('nav.home') }}</a>
      <a class="app-nav-link transition" routerLink="/about" routerLinkActive="is-active">{{ i18n.t('nav.about') }}</a>
      <a class="app-nav-link transition" routerLink="/skills" routerLinkActive="is-active">{{ i18n.t('nav.skills') }}</a>
      <a class="app-nav-link transition" routerLink="/projects" routerLinkActive="is-active">{{ i18n.t('nav.projects') }}</a>
      <a class="app-nav-link transition" routerLink="/experience" routerLinkActive="is-active">{{ i18n.t('nav.experience') }}</a>
      <a class="app-nav-link transition" routerLink="/contact" routerLinkActive="is-active">{{ i18n.t('nav.contact') }}</a>
    </nav>

    <div class="order-2 flex items-center gap-2 md:order-3">
      <p-button [label]="i18n.language().toUpperCase()" severity="secondary" [outlined]="true" size="small" (onClick)="i18n.toggleLanguage()" />
    </div>
  </div>
</header>
