<section id="projects" class="app-section app-section-muted py-20">
  <div appScrollReveal class="mx-auto max-w-6xl px-4">
    <h2 class="app-title text-3xl font-black">{{ i18n.t('projects.title') }}</h2>
    <p class="app-muted mt-3">{{ i18n.t('projects.subtitle') }}</p>
    <div class="mt-10 grid gap-5 lg:grid-cols-3">
      @for (project of projects; track project.title) {
        <p-card [header]="project.title" [subheader]="project.type">
          <p class="app-muted min-h-24">{{ project.description }}</p>
          <div class="mb-5 flex flex-wrap gap-2">
            @for (tech of project.techs; track tech) {
              <p-tag [value]="tech" severity="info" />
            }
          </div>
          <p-button label="GitHub" icon="pi pi-github" severity="secondary" [outlined]="true" />
        </p-card>
      }
    </div>
  </div>
</section>
