<section id="contact" class="app-section app-section-raised py-24">
  <div appScrollReveal class="mx-auto max-w-6xl px-6 sm:px-8 lg:px-4">
    <div>
      <h2 class="app-title text-3xl font-black">{{ i18n.t('contact.title') }}</h2>
      <p class="app-muted mt-4 max-w-6xl text-lg leading-8">{{ i18n.t('contact.subtitle') }}</p>
    </div>

    <div class="mt-10 grid w-fit max-w-full">
      <div class="grid gap-1 py-6 first:pt-0">
        <div class="flex items-center gap-1">
          <h3 class="app-title m-0 font-mono text-xl font-black tracking-[0.16em]">Email</h3>
          <button
            type="button"
            class="app-muted inline-flex h-9 w-9 items-center justify-center rounded-md border border-transparent transition hover:border-[var(--app-border)] hover:text-[var(--app-text)] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--app-accent)]"
            aria-label="Copiar e-mail"
            title="Copiar e-mail"
            (click)="copyEmail()"
          >
            <i class="pi pi-copy text-sm"></i>
          </button>
        </div>
        <a
          [href]="'mailto:' + email"
          class="group inline-flex max-w-full items-center gap-3 font-mono text-base text-[var(--app-text)] no-underline sm:text-lg"
          aria-label="Enviar e-mail"
        >
          <i class="app-accent-text pi pi-envelope text-2xl"></i>
          <span class="break-all transition group-hover:text-[var(--app-accent)]">{{ email }}</span>
        </a>
      </div>

      <div class="grid w-full gap-1 border-t border-[var(--app-border)] py-6">
        <h3 class="app-title m-0 font-mono text-xl font-black tracking-[0.16em]">LinkedIn</h3>
        <a
          [href]="linkedinUrl"
          target="_blank"
          rel="noreferrer"
          class="group inline-flex max-w-full items-center gap-3 font-mono text-base text-[var(--app-text)] no-underline sm:text-lg"
          aria-label="Abrir LinkedIn em nova aba"
        >
          <i class="app-accent-text pi pi-linkedin text-2xl"></i>
          <span class="break-all transition group-hover:text-[var(--app-accent)]">{{ linkedinUrl }}</span>
        </a>
      </div>

      <div class="grid w-full gap-1 border-t border-[var(--app-border)] py-6">
        <h3 class="app-title m-0 font-mono text-xl font-black tracking-[0.16em]">GitHub</h3>
        <a
          [href]="githubUrl"
          target="_blank"
          rel="noreferrer"
          class="group inline-flex max-w-full items-center gap-3 font-mono text-base text-[var(--app-text)] no-underline sm:text-lg"
          aria-label="Abrir GitHub em nova aba"
        >
          <i class="app-accent-text pi pi-github text-2xl"></i>
          <span class="break-all transition group-hover:text-[var(--app-accent)]">{{ githubUrl }}</span>
        </a>
      </div>
    </div>
  </div>
</section>
