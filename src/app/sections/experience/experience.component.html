<section id="experience" class="app-section py-20">
  <div appScrollReveal class="mx-auto max-w-6xl px-4">
    <h2 class="app-title text-3xl font-black">{{ i18n.t('experience.title') }}</h2>
    <p class="app-muted mt-3">{{ i18n.t('experience.subtitle') }}</p>
    <p-timeline [value]="events" align="alternate" styleClass="mt-12">
      <ng-template pTemplate="content" let-event>
        <article class="app-panel rounded-lg border p-5">
          <p class="app-accent-text text-sm font-semibold">{{ event.period }}</p>
          <h3 class="app-title mt-2 text-xl font-bold">{{ event.role }}</h3>
          <p class="app-muted mt-2">{{ event.company }}</p>
          <p class="app-subtle mt-3 text-sm leading-6">{{ event.summary }}</p>
        </article>
      </ng-template>
    </p-timeline>
  </div>
</section>
